all: false
dir: '{{.InterfaceDir}}/mocks'
filename: mocks.go
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: true
log-level: info
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: mocks
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
packages:
  github.com/infracost/actions/tools/scanner/internal/api/dashboard:
    interfaces:
      Client:
  github.com/infracost/actions/tools/scanner/internal/api/events:
    interfaces:
      Client:
  github.com/infracost/vcs/pkg/vcs:
    config:
      dir: internal/mocks/vcs
    interfaces:
      VCS: